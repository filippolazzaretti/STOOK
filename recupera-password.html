<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recupera Password - Stook</title>

  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #000000;
      --bg: #ffffff;
      --card: #f8f8f8;
      --muted: #666;
      --border: #e6e6e6;
      --success-bg: #f1f7f1;
      --success-border: #cfe3cf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      width: 100%;
      padding: 14px 16px;
    }

    .brand {
      display: inline-block;
      font-family: 'Luckiest Guy', cursive;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--text);
      text-decoration: none;
    }

    main {
      min-height: calc(100vh - 58px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 48px;
    }

    .card {
      width: min(100%, 520px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 38px 30px 32px;
      text-align: left;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      text-align: center;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 0.96rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d3d3d3;
      border-radius: 14px;
      font-size: 1rem;
      background: #ffffff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #000000;
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.08);
    }

    .cta-btn {
      display: inline-block;
      width: 100%;
      background: #000000;
      color: #ffffff;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      transition: transform 0.08s ease, background 0.3s ease;
      cursor: pointer;
      border: none;
      margin-top: 8px;
    }

    .cta-btn:hover {
      background: #333333;
      transform: translateY(-1px);
    }

    .helper-box {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid var(--success-border);
      background: var(--success-bg);
      color: #234023;
      display: none;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .helper-box a {
      color: inherit;
      font-weight: 700;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 12px 14px;
      }

      .card {
        padding: 30px 20px 24px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="brand">STOOK</a>
  </div>

  <main>
    <section class="card">
      <h1>Recupera password</h1>
      <p class="intro">Inserisci la tua email e ti invieremo un link per reimpostare le credenziali di accesso.</p>

      <form id="recovery-form" method="post" action="#" autocomplete="on">
        <div class="field">
          <label for="recovery-email">Email</label>
          <input type="email" id="recovery-email" name="email" placeholder="nome@email.com" autocomplete="email" inputmode="email" required>
        </div>

        <button type="submit" class="cta-btn">Invia link di recupero</button>
      </form>

      <div id="recovery-message" class="helper-box"></div>

      <a href="accedi.html" class="back-link">Torna ad accedi</a>
    </section>
  </main>

  <script>
    const recoveryForm = document.getElementById('recovery-form');
    const recoveryEmail = document.getElementById('recovery-email');
    const recoveryMessage = document.getElementById('recovery-message');

    recoveryForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const email = recoveryEmail.value.trim();
      const resetLink = 'reimposta-password.html?email=' + encodeURIComponent(email);

      recoveryMessage.style.display = 'block';
      recoveryMessage.innerHTML = 'Demo del flusso: qui verra inviato un link all\\'indirizzo <strong>' + email + '</strong>.<br><br>Per simulare il passaggio email, apri questo link: <a href="' + resetLink + '">Reimposta la password</a>.';
    });
  </script>
</body>
</html>
