<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi - Stook</title>

  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #000000;
      --bg: #ffffff;
      --card: #f8f8f8;
      --muted: #666;
      --border: #e6e6e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      width: 100%;
      padding: 14px 16px;
    }

    .brand {
      display: inline-block;
      font-family: 'Luckiest Guy', cursive;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--text);
      text-decoration: none;
    }

    main {
      min-height: calc(100vh - 58px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 48px;
    }

    .login-card {
      width: min(100%, 480px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 38px 30px 32px;
      text-align: left;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      text-align: center;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 0.96rem;
    }

    .field {
      margin-bottom: 18px;
    }

    .password-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .forgot-link {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }
    
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d3d3d3;
      border-radius: 14px;
      font-size: 1rem;
      background: #ffffff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #000000;
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.08);
    }

     .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 6px;
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      border-radius: 4px;
      accent-color: #000000;
    }

    .remember-row label {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--muted);
    }
    
    .cta-btn {
      display: inline-block;
      width: 100%;
      background: #000000;
      color: #ffffff;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      transition: transform 0.08s ease, background 0.3s ease;
      cursor: pointer;
      border: none;
      margin-top: 8px;
    }

    .cta-btn:hover {
      background: #333333;
      transform: translateY(-1px);
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .register-link {
      margin-top: 16px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .register-link a {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    
    @media (max-width: 520px) {
      .topbar {
        padding: 12px 14px;
      }

      .login-card {
        padding: 30px 20px 24px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="brand">STOOK</a>
  </div>

  <main>
    <section class="login-card">
      <h1>Accedi</h1>
      <p class="intro">Inserisci email e password per iniziare subito ad acquistare e vendere libri di testo.</p>

      <form method="post" action="#" autocomplete="on">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="nome@email.com" autocomplete="username" inputmode="email" required>
        </div>

        <div class="field">
          <div class="password-row">
            <label for="password">Password</label>
            <a href="recupera-password.html" class="forgot-link">Hai dimenticato la password?</a>
          </div>
          <input type="password" id="password" name="password" placeholder="Inserisci la tua password" autocomplete="current-password" required>
        </div>
        <div class="remember-row">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Ricordami</label>
        </div>

        <button type="submit" class="cta-btn">Entra</button>
        <p class="register-link">Non hai un account? <a href="registrati.html">Registrati</a></p>
      </form>
      

      <a href="index.html" class="back-link">Torna alla home</a>
    </section>
  </main>
</body>
</html>
