<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati - Stook</title>

  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #000000;
      --bg: #ffffff;
      --card: #f8f8f8;
      --muted: #666;
      --border: #e6e6e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      width: 100%;
      padding: 14px 16px;
    }

    .brand {
      display: inline-block;
      font-family: 'Luckiest Guy', cursive;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--text);
      text-decoration: none;
    }

    main {
      min-height: calc(100vh - 58px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 48px;
    }

    .register-card {
      width: min(100%, 520px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 38px 30px 32px;
      text-align: left;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      text-align: center;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 0.96rem;
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d3d3d3;
      border-radius: 14px;
      font-size: 1rem;
      background: #ffffff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: #000000;
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.08);
    }

    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #000000 50%), linear-gradient(135deg, #000000 50%, transparent 50%);
      background-position: calc(100% - 22px) calc(50% - 3px), calc(100% - 16px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      cursor: pointer;
    }

    .cta-btn {
      display: inline-block;
      width: 100%;
      background: #000000;
      color: #ffffff;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      transition: transform 0.08s ease, background 0.3s ease;
      cursor: pointer;
      border: none;
      margin-top: 8px;
    }

    .cta-btn:hover {
      background: #333333;
      transform: translateY(-1px);
    }

    .login-link {
      margin-top: 16px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .login-link a {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .message {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 0.94rem;
      display: none;
    }

    .message.success {
      background: #f1f7f1;
      border: 1px solid #cfe3cf;
      color: #234023;
    }

    .message.error {
      background: #fff2f2;
      border: 1px solid #ecc9c9;
      color: #7a1f1f;
    }

    .field-error {
      min-height: 18px;
      color: #7a1f1f;
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .message-hint {
      margin-top: -4px;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .preview-card {
      margin-top: 28px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 18px;
    }

    .preview-card h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }

    .preview-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .preview-audience {
      margin-top: 12px;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
    }

    .preview-list {
      list-style: none;
      padding: 0;
      margin: 18px 0 0;
      display: grid;
      gap: 12px;
    }

    .preview-list li {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fafafa;
    }

    .preview-list strong,
    .preview-list span {
      display: block;
    }

    .preview-list strong {
      margin-bottom: 4px;
    }

    .preview-list span {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.94rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 12px 14px;
      }

      .register-card {
        padding: 30px 20px 24px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="brand">STOOK</a>
  </div>

  <main>
    <section class="register-card">
      <h1>Registrati</h1>
      <p class="intro">Crea il tuo account per iniziare a comprare e vendere libri usati tra studenti.</p>

      <form id="register-form" method="post" action="#" autocomplete="on" novalidate>
        <div class="field">
          <label for="first-name">Nome</label>
          <input type="text" id="first-name" name="first-name" placeholder="Inserisci il tuo nome" autocomplete="given-name" required>
          <div class="field-error" data-field-error="firstName"></div>
        </div>

        <div class="field">
          <label for="last-name">Cognome</label>
          <input type="text" id="last-name" name="last-name" placeholder="Inserisci il tuo cognome" autocomplete="family-name" required>
          <div class="field-error" data-field-error="lastName"></div>
        </div>

        <div class="field">
          <label for="phone">Numero di telefono</label>
          <input type="tel" id="phone" name="phone" placeholder="Inserisci il tuo numero" autocomplete="tel" inputmode="tel" required>
          <div class="field-error" data-field-error="phone"></div>
        </div>

        <div class="field">
          <label for="university">Ateneo</label>
          <select id="university" name="university" autocomplete="organization" required>
            <option value="">Seleziona il tuo ateneo</option>
            <option value="cafoscari">Universita Ca' Foscari - Venezia</option>
            <option value="iuav">IUAV - Venezia</option>
            <option value="trieste">Universita degli Studi di Trieste</option>
            <option value="bologna">Alma Mater Studiorum - Universita di Bologna</option>
          </select>
          <div class="field-error" data-field-error="university"></div>
        </div>

        <div class="field">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" name="email" placeholder="nome@email.com" autocomplete="email" inputmode="email" required>
          <div class="field-error" data-field-error="email"></div>
        </div>

        <div class="field">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" name="password" placeholder="Crea una password" autocomplete="new-password" required>
          <div class="field-error" data-field-error="password"></div>
        </div>

        <p class="message-hint">Tutti i campi nome, cognome, email, numero di telefono e ateneo sono obbligatori.</p>

        <button type="submit" class="cta-btn">Crea account</button>

        <p class="login-link">Hai gia un account? <a href="accedi.html">Accedi</a></p>
      </form>

      <div id="register-success" class="message success"></div>
      <div id="register-error" class="message error"></div>

      <section id="university-preview" class="preview-card" hidden>
        <h2 id="preview-title"></h2>
        <p id="preview-text"></p>
        <p id="preview-audience" class="preview-audience"></p>
        <ul id="preview-list" class="preview-list"></ul>
      </section>

      <a href="index.html" class="back-link">Torna alla home</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/register.js"></script>
</body>
</html>
