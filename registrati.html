<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati - Stook</title>

  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #000000;
      --bg: #ffffff;
      --card: #f8f8f8;
      --muted: #666;
      --border: #e6e6e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      width: 100%;
      padding: 14px 16px;
    }

    .brand {
      display: inline-block;
      font-family: 'Luckiest Guy', cursive;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--text);
      text-decoration: none;
    }

    main {
      min-height: calc(100vh - 58px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 48px;
    }

    .register-card {
      width: min(100%, 520px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 38px 30px 32px;
      text-align: left;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      text-align: center;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 0.96rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d3d3d3;
      border-radius: 14px;
      font-size: 1rem;
      background: #ffffff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #000000;
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.08);
    }

    .cta-btn {
      display: inline-block;
      width: 100%;
      background: #000000;
      color: #ffffff;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      transition: transform 0.08s ease, background 0.3s ease;
      cursor: pointer;
      border: none;
      margin-top: 8px;
    }

    .cta-btn:hover {
      background: #333333;
      transform: translateY(-1px);
    }

    .login-link {
      margin-top: 16px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .login-link a {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
    .message {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 0.94rem;
      display: none;
    }

    .message.success {
      background: #f1f7f1;
      border: 1px solid #cfe3cf;
      color: #234023;
    }

    .message.error {
      background: #fff2f2;
      border: 1px solid #ecc9c9;
      color: #7a1f1f;
    }
    @media (max-width: 520px) {
      .topbar {
        padding: 12px 14px;
      }

      .register-card {
        padding: 30px 20px 24px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="brand">STOOK</a>
  </div>

  <main>
    <section class="register-card">
      <h1>Registrati</h1>
      <p class="intro">Crea il tuo account per iniziare a comprare e vendere libri usati tra studenti.</p>

      <form id="register-form" method="post" action="#" autocomplete="on">
        <div class="field">
          <label for="name">Nome e cognome</label>
          <input type="text" id="name" name="name" placeholder="Inserisci il tuo nome" autocomplete="name" required>
        </div>

           <label for="phone">Numero di telefono</label>
          <input type="tel" id="phone" name="phone" placeholder="Inserisci il tuo numero" autocomplete="tel" inputmode="tel" required>
        </div>

        <div class="field">
          <label for="university">Ateneo</label>
          <input type="text" id="university" name="university" placeholder="Inserisci l'ateneo che frequenti" autocomplete="organization" required>
        </div>

        <div class="field">

        <div class="field">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" name="email" placeholder="nome@email.com" autocomplete="email" inputmode="email" required>
        </div>

        <div class="field">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" name="password" placeholder="Crea una password" autocomplete="new-password" required>
        </div>

        <button type="submit" class="cta-btn">Crea account</button>

        <p class="login-link">Hai gia un account? <a href="accedi.html">Accedi</a></p>
      </form>

      <div id="register-success" class="message success"></div>
      <div id="register-error" class="message error"></div>

      <a href="index.html" class="back-link">Torna alla home</a>
    </section>
  </main>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://uaelkranbqialxjpoqkk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhZWxrcmFuYnFpYWx4anBvcWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzExMDcsImV4cCI6MjA5MTc0NzEwN30.3RAuhcrAlemr9EpwQsdJRj6xzeS2CH0OxRvQrHVFdns';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const registerForm = document.getElementById('register-form');
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');
    const universityInput = document.getElementById('university');
    const registerEmailInput = document.getElementById('register-email');
    const registerPasswordInput = document.getElementById('register-password');
    const registerSuccess = document.getElementById('register-success');
    const registerError = document.getElementById('register-error');

    registerForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      registerSuccess.style.display = 'none';
      registerError.style.display = 'none';

      const fullName = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const university = universityInput.value.trim();
      const email = registerEmailInput.value.trim();
      const password = registerPasswordInput.value;

      const emailRedirectTo = window.location.origin + '/accedi.html';
      const { error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
          emailRedirectTo: emailRedirectTo,
          data: {
            full_name: fullName,
            phone: phone,
            university: university
          }
        }
      });

      if (error) {
        registerError.textContent = error.message;
        registerError.style.display = 'block';
        return;
      }

      registerSuccess.textContent = 'Account creato. Controlla la tua email per confermare la registrazione prima di accedere.';
      registerSuccess.style.display = 'block';
      registerForm.reset();
    });
  </script>
</body>
</html>
